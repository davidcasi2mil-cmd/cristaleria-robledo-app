services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cristaleria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cristaleria_robledo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cristaleria}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/davidcasi2mil-cmd/cristaleria-robledo-app/backend:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cristaleria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cristaleria_robledo}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/davidcasi2mil-cmd/cristaleria-robledo-app/frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    depends_on:
      - backend

volumes:
  postgres_data:
